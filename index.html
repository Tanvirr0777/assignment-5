<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Job Issue</title>

    <!--daisyui+tailwind-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--icon-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <style>
        .geist{
             font-family: "Geist", sans-serif;
        }

     </style>

</head>
<body class="geist">


     <header id="login">
        <div id="loginPage" class="mt-5 ">

      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4
       w-6/12 mx-auto space-y-2">

       <div class="loginimage text-center flex flex-col items-center justify-center space-y-5 mb-4">

        <div><img class="" src="./assets/github-logo.png" alt="github-logo"></div>
         <div><h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-gray-400">Sign in to manage your issues</p></div>

       </div>

       <div class="space-y-4">
          <div>
            <label class="label text-black">Username</label>
            <input id="Username" type="text" class="input" placeholder="Enter Username" />
          </div>

          <div>
            <label class="label text-black">Password</label>
            <input id="password" type="password" class="input" placeholder="Enter Password" />
          </div>

       </div>

      <button class="btn btn-primary mt-4" onclick="loginPass()">Sign In</button>

      <div class="flex items-center my-4">
        <hr class="flex-grow border-gray-300">
        <span class="px-3 text-gray-500">OR</span>
        <hr class="flex-grow border-gray-300">

      </div>

      <div class="text-center py-2 space-y-3">
        <p>Demo credintial</p>
        <div class="shadow-lg p-3">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span font-bold>Password:</span> admin123</p>
        </div>
      </div>

    </fieldset>

     </div>
     </header>
    
     <main id="main" class="mt-5 text-center w-11/12 mx-auto">

        <h1 class="font-bold text-4xl">Welcome to body</h1>

        <header>
    <div class="navbar bg-base-100 shadow-sm flex justify-between ">

    <div class="flex">
      
         <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
             <div class="w-10 rounded-full">
              <img
                alt="gitHub-logo"
                src="./assets/github-logo.png"/>
             </div>
          </div>

         <div class=""> <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a></div>
     </div> 
    
  
       <div class="flex gap-2">
         <div>
            <input id="input-search" type="text" placeholder="Search issue"
             class="input input-bordered"/>
         </div>
         <div><button onclick="searchIssue()" id="btn-search" class="btn btn-primary">+ New issue</button></div>
      </div>       
   </div>
        </header>

     <div class="py-2 flex gap-2 shadow-sm mt-10 w-[97%] mx-auto">
        <button id="btn-all" class="btn btn-primary w-25" onclick="activeBtn('btn-all')">All</button>
        <button id="btn-open" class="btn w-24" onclick="activeBtn('btn-open')">Open</button>
        <button id="btn-close" class="btn w-25" onclick="activeBtn('btn-close')">Close</button>
     </div>

      <div class="mt-8 shadow-sm flex justify-between p-3 w-[97%] mx-auto">

        <div class="flex gap-2">
         <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
             <div class="w-10 rounded-full">
                <img src="./assets/Aperture.png" alt="">
             </div>
          </div>

         <div class="text-left"> 
              <h2 class="text-xl font-bold"> <span id="issue-number">50</span> Issues</h2>
              <p class="text-gray-400">Track and manage your project issues</p>
         </div>
     </div> 
    
        <div class="flex gap-4">
            <div><i class="fa-solid fa-circle text-green-500"></i>Open</div>
            <div><i class="fa-solid fa-circle text-violet-500"></i>Close</div>

        </div>

      </div>

       <section id="spinner" class="w-6/12 mx-auto flex items-center justify-center py-10 hidden">
         <span class="loading loading-spinner loading-xl"></span>
     </section>

      <section id="card-conatiner" class="mt-5 w-[97%] mx-auto grid grid-cols-4 gap-5">  

      </section>

      <!--modal-->
      <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
   <div class="modal-box">
    
      <div id="modal-details" class="space-y-3"></div>
    
         <div class="modal-action">
            <form method="dialog">
           <button class="btn btn-primary">Close</button>
           </form>
       </div>

  </div>
      </dialog>

     </main>
    
    
    <script src="./script/index.js"></script>
</body>
</html>
